name: frontend

on:
  pull_request:
    paths:
      - 'frontend/**'
      - 'tests/unit/openapi_snapshot.json'
      - '.github/workflows/frontend.yml'
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'tests/unit/openapi_snapshot.json'
      - '.github/workflows/frontend.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - run: npm test

      # tsc -b && vite build — the typecheck + build gate (no eslint config exists).
      - run: npm run build
